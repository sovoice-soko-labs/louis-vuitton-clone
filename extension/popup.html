<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      width: 280px;
      font: 14px/1.4 system-ui, sans-serif;
      padding: 14px;
      color: #111;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    p.hint { color: #666; font-size: 12px; margin-bottom: 12px; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.5; cursor: wait; }
    #status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      min-height: 2.5em;
      background: #f5f5f5;
      word-break: break-word;
    }
    #status.ok { background: #e8f5e9; color: #1b5e20; }
    #status.err { background: #ffebee; color: #b71c1c; }
    #status.pending { background: #fff8e1; color: #795548; }
  </style>
</head>
<body>
  <h1>LV Seite speichern</h1>
  <p class="hint">Auf LV-Seite → F5 → dann Button klicken</p>
  <button id="save" type="button">Seite jetzt speichern</button>
  <div id="status">Bereit.</div>
  <script src="popup.js"></script>
</body>
</html>
